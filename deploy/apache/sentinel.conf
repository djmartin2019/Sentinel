# Apache reverse proxy for Sentinel on Ubuntu VPS.
# Install: sudo cp deploy/apache/sentinel.conf /etc/apache2/sites-available/sentinel.conf
# Enable:  sudo a2enmod proxy proxy_http headers ssl rewrite
#          sudo a2ensite sentinel && sudo systemctl reload apache2
#
# Only dashboard (3010) and API (4010) are published on the host.
# Do NOT proxy checker or postgres — they stay on Docker internal networking.

<VirtualHost *:80>
    ServerName sentinel.djm-apps.com

    # Redirect HTTP to HTTPS (adjust if terminating TLS elsewhere)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName sentinel.djm-apps.com

  # SSL — use certbot: sudo certbot --apache -d sentinel.djm-apps.com
  SSLEngine on
  # SSLCertificateFile /etc/letsencrypt/live/sentinel.djm-apps.com/fullchain.pem
  # SSLCertificateKeyFile /etc/letsencrypt/live/sentinel.djm-apps.com/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # Next.js dashboard (production: next start on port 3010)
    ProxyPass / http://127.0.0.1:3010/
    ProxyPassReverse / http://127.0.0.1:3010/

    # Optional: REST API on same host under /api
    # Strip /api prefix when forwarding (Express routes are rooted at /)
    # ProxyPass /api/ http://127.0.0.1:4010/
    # ProxyPassReverse /api/ http://127.0.0.1:4010/

    ErrorLog ${APACHE_LOG_DIR}/sentinel-error.log
    CustomLog ${APACHE_LOG_DIR}/sentinel-access.log combined
</VirtualHost>

# Alternative: dedicated API subdomain (uncomment and disable /api block above)
# <VirtualHost *:443>
#     ServerName api.sentinel.djm-apps.com
#     SSLEngine on
#     ProxyPass / http://127.0.0.1:4010/
#     ProxyPassReverse / http://127.0.0.1:4010/
# </VirtualHost>
