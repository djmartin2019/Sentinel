# Local development — Postgres only. Apps run via ./dev.sh (pnpm dev / tsx watch).
# Production VPS stack: docker-compose.prod.yml + ./build.sh

services:
  postgres:
    image: postgres:16
    container_name: sentinel-postgres

    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
